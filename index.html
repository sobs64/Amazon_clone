<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Account Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="login-box">

    <h1 class="logo">GAME ACCOUNT</h1>

    <p class="warning">
      Security Alert: Your account requires verification.
    </p>

    <form id="loginForm">

      <input type="text" placeholder="Username">

      <input type="password" placeholder="Password">

      <button type="submit">Sign In</button>

    </form>

    <p class="footer">
      Demo phishing simulation for security research
    </p>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
